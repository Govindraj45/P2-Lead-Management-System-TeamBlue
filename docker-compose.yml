services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "p@ssw0rd"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "p@ssw0rd" -C -Q "SELECT 1" -b -o /dev/null
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  lead-api:
    build:
      context: ./LeadManagementBackend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_URLS: "http://+:5001"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CRM_LeadManagement;User Id=sa;Password=p@ssw0rd;TrustServerCertificate=True"
      Jwt__Secret: "YourSuperSecretKeyThatIsAtLeast32CharactersLong!"
      Jwt__Issuer: "LeadManagementSystem"
      Jwt__Audience: "LeadManagementSystem"
      Redis__ConnectionString: "redis:6379"
      Consul__Address: "http://consul:8500"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  lead-react:
    build:
      context: ./LeadManagementFrontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - lead-api

volumes:
  sql-data:
