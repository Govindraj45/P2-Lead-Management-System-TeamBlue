apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lms

resources:
  - ../../base

patches:
  # Scale down to 1 replica for dev
  - target:
      kind: Deployment
      name: lms-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: lms-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

# For local dev: use locally built images (no registry prefix)
images:
  - name: lms-api
    newName: lms-api
    newTag: latest
  - name: lms-frontend
    newName: lms-frontend
    newTag: latest
