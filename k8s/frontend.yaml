apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-react
  namespace: lead-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lead-react
  template:
    metadata:
      labels:
        app: lead-react
    spec:
      containers:
        - name: lead-react
          image: lead-react:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: lead-react-service
  namespace: lead-management
spec:
  type: NodePort
  selector:
    app: lead-react
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
