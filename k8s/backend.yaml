apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-api
  namespace: lead-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lead-api
  template:
    metadata:
      labels:
        app: lead-api
    spec:
      containers:
        - name: lead-api
          image: lead-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: lms-config
            - secretRef:
                name: lms-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lead-api-service
  namespace: lead-management
spec:
  selector:
    app: lead-api
  ports:
    - port: 5001
      targetPort: 5001
