apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-frontend
  namespace: lms
  labels:
    app: lms-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-frontend
  template:
    metadata:
      labels:
        app: lms-frontend
    spec:
      containers:
        - name: lms-frontend
          image: lms-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: API_BACKEND_URL
              value: "http://lms-api:5000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: lms-frontend
  namespace: lms
spec:
  selector:
    app: lms-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
