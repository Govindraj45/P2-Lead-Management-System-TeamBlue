# This file configures Nginx to serve the React frontend and forward API calls to the backend.

server {
    # Listen for web traffic on port 80 (standard HTTP port)
    listen 80;
    # Accept requests addressed to "localhost"
    server_name localhost;

    # Where the React app's built files live inside the container
    root /usr/share/nginx/html;
    # Serve index.html as the default page
    index index.html;

    # Forward any request starting with /api/ to the backend server
    # This means the frontend and API share the same domain (no CORS issues)
    location /api/ {
        proxy_pass http://lead-api:5000;
        # Pass along the original request headers so the backend knows who's calling
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # For all other requests, serve the React app
    # If a file doesn't exist, fall back to index.html (needed for React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ==========================================================================
# SUMMARY:
# This Nginx config serves the React frontend on port 80 and acts as a reverse
# proxy for API calls. Any request to /api/ is forwarded to the backend at
# lead-api:5000, while all other requests serve the React single-page app.
# The try_files directive ensures React Router works correctly for client-side
# navigation (refreshing a page like /leads/5 won't give a 404 error).
# ==========================================================================
